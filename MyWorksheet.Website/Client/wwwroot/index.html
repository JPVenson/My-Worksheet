<body>
	<app>
		<link defer href="css/preApp/pre-app.min.css" rel="stylesheet" />
		<div class="body-loading-overlay">
			<p class="center-element">
				<img src="/Icons/waiter-icon.svg" alt="My-Worksheet Icon" />
			</p>
			<h1 class="center-element">
				Please wait while My-Worksheet is loading
				<br />
			</h1>
			<div class="center-element">
				<div class="progress">
					<progress id="progressbar" class="progress-bar progress-bar-striped active" role="progressbar"
						value="0" max="1" title="Loaded Resources">
					</progress>
				</div>
			</div>
			<div class="center-element">
				<span id="current-progress"></span>
				<ul id="items-list"></ul>
			</div>
		</div>
	</app>

	<div id="blazor-error-ui" class="alert alert-danger">
		An unhandled error has occurred.
		<a href="" class="reload">Reload</a>
		<a class="dismiss">🗙</a>
	</div>

	<noscript>
		<div class="alert alert-danger">
			<span class="text text-center center-block">
				<strong>Notice: </strong> JavaScript is not enabled. JavaScript is necessary for
				<b>My-Worksheet.com</b>.
				Here are the <a href="http://www.enable-javascript.com/" target="_blank"> instructions how to enable
					JavaScript in your web browser</a>.
			</span>
		</div>
		<div class="center-element">
			<img alt="No Java - No Script - No Service" class="rounded" style="max-height: 90vh;"
				src="/Icons/nojsnoservice8.png" />
		</div>
	</noscript>

	<script src="_framework/blazor.webassembly.js" autostart="false"></script>
	<script>
		var loadState = {
			startedResources: 0,
			completedResources: 0,
			activeResourceLoadedBytes: 0,
			activeResourceTotalBytes: 0
		};

		Blazor.start({
			loadBootResource: function (type, name, defaultUri, integrity) {
				if (type === 'dotnetjs')
					return defaultUri;

				var progressbar = document.getElementById('progressbar');
				var progressbarContent = document.getElementById('current-progress');
				loadState.startedResources += 1;
				loadState.activeResourceLoadedBytes = 0;
				loadState.activeResourceTotalBytes = 0;
				updateProgressUi(progressbar, progressbarContent, loadState);

				return fetch(defaultUri, { cache: 'no-cache' })
					.then(function (response) {
						var resourceLength = tryGetResourceLength(response.headers);
						loadState.activeResourceTotalBytes = resourceLength || 0;
						updateProgressUi(progressbar, progressbarContent, loadState);

						return new Response(new ReadableStream({
							start: function (controller) {
								var reader = response.body.getReader();

								function pump() {
									return reader.read().then(function (result) {
										if (result.done) {
											loadState.completedResources += 1;
											loadState.activeResourceLoadedBytes = 0;
											loadState.activeResourceTotalBytes = 0;
											updateProgressUi(progressbar, progressbarContent, loadState);
											controller.close();
											return;
										}

										loadState.activeResourceLoadedBytes += result.value.byteLength;
										updateProgressUi(progressbar, progressbarContent, loadState);
										controller.enqueue(result.value);
										return pump();
									});
								}

								return pump();
							}
						}));
					})
					.catch(function (error) {
						updateProgressUi(progressbar, progressbarContent, loadState);
						throw error;
					});
			}
		});

		function tryGetResourceLength(headers) {
			var xFileSize = headers.get('x-file-size');
			var contentLength = headers.get('content-length');
			var rawValue = xFileSize || contentLength;

			if (rawValue === null)
				return null;

			var parsedValue = parseInt(rawValue, 10);
			return Number.isFinite(parsedValue) && parsedValue > 0 ? parsedValue : null;
		}

		function updateProgressUi(progressbar, progressbarContent, state) {
			var started = Math.max(state.startedResources, 1);
			var progressUnits = state.completedResources;

			if (state.activeResourceTotalBytes > 0) {
				progressUnits += Math.min(state.activeResourceLoadedBytes / state.activeResourceTotalBytes, 1);
			}

			var percent = Math.round(Math.min(progressUnits / started, 1) * 100);
			progressbar.max = 100;
			progressbar.value = percent;
			progressbarContent.textContent = percent + ' %';
		}

		function UpdateWaiterText(text) {
			var progressbarContent = document.getElementById('current-progress');
			progressbarContent.textContent = text;
		}

		window.UpdateWaiterText = UpdateWaiterText;
	</script>
